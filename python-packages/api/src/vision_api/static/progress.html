<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video ASR Progress</title>
<style>
  body { font-family: monospace; background: #111; color: #ddd; padding: 24px; max-width: 760px; margin: 0 auto; }
  h2 { color: #fff; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  .stage-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid #222; }
  .stage-icon { width: 18px; text-align: center; font-size: 16px; }
  .stage-name { width: 110px; color: #aaa; }
  .stage-status { width: 70px; font-size: 12px; }
  .stage-duration { color: #666; font-size: 12px; }
  .status-pending { color: #555; }
  .status-running { color: #fa0; }
  .status-done { color: #4c4; }
  .status-failed { color: #f44; }
  .progress-bar { margin-top: 8px; font-size: 13px; color: #ccc; }
  .bar-track { display: inline-block; background: #333; border-radius: 2px; padding: 0 2px; letter-spacing: -1px; }
  .bar-fill { color: #4c4; }
  .bar-empty { color: #555; }
  .chunks { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .chunk-badge { background: #1a1a2e; border: 1px solid #333; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
  .badge-gemini { color: #6af; border-color: #246; }
  .badge-funasr { color: #fa6; border-color: #642; }
  .badge-unknown { color: #888; }
  .cost { margin-top: 24px; color: #888; font-size: 13px; }
  .cost span { color: #fff; }
  .status-bar { margin-bottom: 20px; padding: 6px 10px; background: #1a1a1a; border-radius: 4px; font-size: 12px; color: #666; }
  #error { color: #f66; margin-top: 12px; font-size: 12px; }
</style>
</head>
<body>
<h2>Video ASR Progress</h2>
<div class="subtitle" id="video-id-label"></div>
<div class="status-bar" id="conn-status">Connecting...</div>
<div id="stages"></div>
<div id="chunk-progress"></div>
<div class="cost">Total cost: <span id="cost">$0.000000</span></div>
<div id="error"></div>

<script>
const STAGES = ["ingest", "preprocess", "transcribe", "merge", "render", "analyze", "load"];
const STATUS_ICON = { pending: "○", running: "◎", done: "●", failed: "✗" };
const STATUS_CLASS = { pending: "status-pending", running: "status-running", done: "status-done", failed: "status-failed" };

function getVideoId() {
  const p = new URLSearchParams(window.location.search);
  return p.get("video_id") || "";
}

function engineBadge(engine) {
  if (!engine) return '<span class="chunk-badge badge-unknown">?</span>';
  if (engine.toLowerCase().includes("funasr")) return '<span class="chunk-badge badge-funasr">F</span>';
  return '<span class="chunk-badge badge-gemini">G</span>';
}

function renderBar(done, total) {
  if (total === null || total === undefined) return "";
  const width = 20;
  const filled = Math.round((done / total) * width);
  const empty = width - filled;
  const bar = '<span class="bar-fill">' + "█".repeat(filled) + '</span>' +
               '<span class="bar-empty">' + "░".repeat(empty) + '</span>';
  return '<span class="bar-track">' + bar + '</span> ' + done + "/" + total;
}

function render(data) {
  const stageMap = {};
  for (const s of (data.stages || [])) stageMap[s.stage] = s;

  const stagesEl = document.getElementById("stages");
  stagesEl.innerHTML = STAGES.map(name => {
    const s = stageMap[name];
    const status = s ? s.status : "pending";
    const icon = STATUS_ICON[status] || "○";
    const cls = STATUS_CLASS[status] || "status-pending";
    const dur = s && s.duration_sec != null ? s.duration_sec.toFixed(1) + "s" : "";
    return `<div class="stage-row">
      <span class="stage-icon ${cls}">${icon}</span>
      <span class="stage-name">${name}</span>
      <span class="stage-status ${cls}">${status}</span>
      <span class="stage-duration">${dur}</span>
    </div>`;
  }).join("");

  const tp = data.transcribe_progress;
  const cpEl = document.getElementById("chunk-progress");
  if (tp && (tp.total || tp.done)) {
    const bar = renderBar(tp.done, tp.total);
    const badges = (tp.chunks || []).map(c => engineBadge(c.engine)).join("");
    cpEl.innerHTML = '<div class="progress-bar">Transcribe: ' + bar + '</div>' +
                     (badges ? '<div class="chunks">' + badges + '</div>' : "");
  } else {
    cpEl.innerHTML = "";
  }

  document.getElementById("cost").textContent = "$" + (data.cost_usd || 0).toFixed(6);
}

function connect(videoId) {
  const url = "/api/intelligence/video-asr/videos/" + encodeURIComponent(videoId) + "/progress";
  const connEl = document.getElementById("conn-status");
  const errEl = document.getElementById("error");

  const es = new EventSource(url);
  connEl.textContent = "Connected";

  es.addEventListener("progress", e => {
    errEl.textContent = "";
    try {
      render(JSON.parse(e.data));
    } catch (ex) {
      errEl.textContent = "Parse error: " + ex.message;
    }
  });

  es.onerror = () => {
    connEl.textContent = "Disconnected — reconnecting in 3s...";
    es.close();
    setTimeout(() => connect(videoId), 3000);
  };
}

const videoId = getVideoId();
if (videoId) {
  document.getElementById("video-id-label").textContent = videoId;
  connect(videoId);
} else {
  document.getElementById("error").textContent = "No video_id in query string. Usage: ?video_id=BV1zN4y1H7d7";
}
</script>
</body>
</html>
